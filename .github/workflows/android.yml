name: Android CI build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type: debug, beta, or release'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - beta
          - release
      version_name:
        description: 'Custom version name (optional, e.g., 0.80.3). Leave empty to use baseVersionName from project-versions.json'
        required: false
        type: string
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.detect_build_type.outputs.build_type }}
      version_name: ${{ steps.detect_build_type.outputs.version_name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Detect build type from tag or input
        id: detect_build_type
        run: |
          # Determine build type
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger - use input
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
            echo "Manual trigger with build_type: $BUILD_TYPE"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Tag trigger - detect from tag suffix
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "Tag trigger with tag: $TAG_NAME"
            
            if [[ "$TAG_NAME" == *-debug ]]; then
              BUILD_TYPE="debug"
            elif [[ "$TAG_NAME" == *-beta ]]; then
              BUILD_TYPE="beta"
            else
              BUILD_TYPE="release"
            fi
          else
            # PR or push - default to debug
            BUILD_TYPE="debug"
          fi
          
          echo "Detected build type: $BUILD_TYPE"
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

      - name: Update version configuration
        run: |
          # Read base version from project-versions.json
          BASE_VERSION=$(cat project-versions.json | jq -r '.baseVersionName // .appVersionName')
          echo "Base version: $BASE_VERSION"
          
          # Determine final version name
          BUILD_TYPE="${{ steps.detect_build_type.outputs.build_type }}"
          
          if [[ -n "${{ github.event.inputs.version_name }}" ]]; then
            # Use custom version from input
            BASE_VERSION="${{ github.event.inputs.version_name }}"
            echo "Using custom version: $BASE_VERSION"
          fi
          
          # Add suffix based on build type
          if [[ "$BUILD_TYPE" == "debug" ]]; then
            VERSION_NAME="${BASE_VERSION}-debug"
          elif [[ "$BUILD_TYPE" == "beta" ]]; then
            VERSION_NAME="${BASE_VERSION}-beta"
          else
            VERSION_NAME="$BASE_VERSION"
          fi
          
          # Calculate versionCode from version components
          # Format: MAJOR.MINOR.PATCH -> MAJOR*1000000 + MINOR*10000 + PATCH*1000
          if [[ "$BASE_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            VERSION_CODE=$((MAJOR * 1000000 + MINOR * 10000 + PATCH * 1000))
          else
            VERSION_CODE=$(date +%s | tail -c 6)
          fi
          
          echo "Final version name: $VERSION_NAME"
          echo "Version code: $VERSION_CODE"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          
          # Update project-versions.json (keep baseVersionName, set final appVersionName)
          cat project-versions.json | jq \
            --arg vn "$VERSION_NAME" \
            --arg vc "$VERSION_CODE" \
            '.appVersionName = $vn | .appVersionCode = ($vc | tonumber)' \
            > project-versions.json.tmp && mv project-versions.json.tmp project-versions.json
          
          echo "Updated project-versions.json:"
          cat project-versions.json

      - name: Decode keystore
        if: steps.detect_build_type.outputs.build_type == 'release'
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "Decoding keystore..."
            echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
            echo "KEYSTORE_FILE=app/release-keystore.jks" >> $GITHUB_ENV
          fi

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          BUILD_TYPE="${{ steps.detect_build_type.outputs.build_type }}"
          echo "Building $BUILD_TYPE APK..."
          
          if [[ "$BUILD_TYPE" == "debug" ]]; then
            ./gradlew assembleCoolapkDebug --info
          elif [[ "$BUILD_TYPE" == "beta" ]]; then
            ./gradlew assembleCoolapkBeta --info
          else
            ./gradlew assembleCoolapkRelease --info
          fi

      - name: List APK files
        run: find . -name "*.apk" -type f

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.detect_build_type.outputs.build_type }}-apk
          path: |
            app/build/outputs/apk/coolapk/${{ steps.detect_build_type.outputs.build_type }}/*.apk
            app/build/outputs/apk/coolapk/debug/*.apk
            app/build/outputs/apk/coolapk/beta/*.apk
            app/build/outputs/apk/coolapk/release/*.apk

  # Release job - only runs on tags
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.build_type }}-apk
          path: artifacts

      - name: List downloaded files
        run: find artifacts -name "*.apk" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to WebDAV (坚果云)
        env:
          WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
        run: |
          if [ -n "$WEBDAV_URL" ] && [ -n "$WEBDAV_USER" ] && [ -n "$WEBDAV_PASSWORD" ]; then
            echo "Uploading APKs to WebDAV..."
            TAG_NAME=${GITHUB_REF#refs/tags/}
            
            # Create directories step by step
            curl -X MKCOL -u "$WEBDAV_USER:$WEBDAV_PASSWORD" "${WEBDAV_URL}/Auto.js.HYB1996" 2>/dev/null || true
            curl -X MKCOL -u "$WEBDAV_USER:$WEBDAV_PASSWORD" "${WEBDAV_URL}/Auto.js.HYB1996/${TAG_NAME}" 2>/dev/null || true
            
            WEBDAV_PATH="${WEBDAV_URL}/Auto.js.HYB1996/${TAG_NAME}"
            
            # Upload APK files
            for APK_FILE in artifacts/*.apk; do
              if [ -f "$APK_FILE" ]; then
                APK_NAME=$(basename "$APK_FILE")
                echo "Uploading $APK_NAME..."
                curl -T "$APK_FILE" -u "$WEBDAV_USER:$WEBDAV_PASSWORD" "${WEBDAV_PATH}/${APK_NAME}"
              fi
            done
            echo "WebDAV upload completed!"
          else
            echo "WebDAV credentials not configured, skipping upload"
          fi