name: Android CI build
on:
  workflow_dispatch:
  push:
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [common, coolapk, github]
        include:
          - flavor: common
            app_id: org.autojs.autojs
          - flavor: coolapk
            app_id: org.autojs.autojs.coolapk
          - flavor: github
            app_id: org.autojs.autojs.github
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Configure GitHub Packages
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GITHUB_USERNAME=${{ github.actor }}" >> $GITHUB_ENV
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Update version from git tag
        run: |
          # Get tag name or use default
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            # Remove 'v' prefix if present (v4.1.1-alpha8 -> 4.1.1-alpha8)
            VERSION_NAME=${TAG_NAME#v}
          else
            # For non-tag builds, use commit hash
            VERSION_NAME="dev-$(git rev-parse --short HEAD)"
          fi
          
          # Calculate versionCode from tag or use timestamp
          # For tags like 4.1.1-alpha8: major*10000 + minor*100 + patch + alpha/beta number
          if [[ "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-alpha([0-9]+))?(-beta([0-9]+))?$ ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            ALPHA=${BASH_REMATCH[5]:-0}
            BETA=${BASH_REMATCH[7]:-0}
            # versionCode: 4.1.1-alpha8 -> 4010180, allows up to 99 for each component
            VERSION_CODE=$((MAJOR * 1000000 + MINOR * 10000 + PATCH * 1000 + ALPHA * 10 + BETA))
          else
            # Fallback: use timestamp-based code
            VERSION_CODE=$(date +%s | tail -c 6)
          fi
          
          echo "Version name: $VERSION_NAME"
          echo "Version code: $VERSION_CODE"
          
          # Update project-versions.json
          cat project-versions.json | jq \
            --arg vn "$VERSION_NAME" \
            --arg vc "$VERSION_CODE" \
            '.appVersionName = $vn | .appVersionCode = ($vc | tonumber)' \
            > project-versions.json.tmp && mv project-versions.json.tmp project-versions.json
          
          echo "Updated project-versions.json:"
          cat project-versions.json

      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "Decoding keystore..."
            echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
            echo "KEYSTORE_FILE=app/release-keystore.jks" >> $GITHUB_ENV
          fi

      - name: Build Debug APK (for non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: ./gradlew assemble${{ matrix.flavor }}Debug --info

      - name: Build Release APK (for tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -f app/release-keystore.jks ]; then
            echo "Building signed release APK for ${{ matrix.flavor }}..."
            ./gradlew assemble${{ matrix.flavor }}Release --info
          else
            echo "Keystore not found, building unsigned release for ${{ matrix.flavor }}..."
            ./gradlew assemble${{ matrix.flavor }}Release --info
          fi

      - name: List APK files
        run: find . -name "*.apk" -type f

      - name: Upload Debug APK (${{ matrix.flavor }})
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ matrix.flavor }}
          path: app/build/outputs/apk/${{ matrix.flavor }}/debug/*.apk

      - name: Upload Release APK (${{ matrix.flavor }})
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ matrix.flavor }}
          path: app/build/outputs/apk/${{ matrix.flavor }}/release/*.apk

  # Release job - only runs on tags
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-apk-*
          merge-multiple: false

      - name: List downloaded files
        run: find artifacts -name "*.apk" -type f

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -name "*.apk" -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to WebDAV (坚果云)
        env:
          WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
        run: |
          if [ -n "$WEBDAV_URL" ] && [ -n "$WEBDAV_USER" ] && [ -n "$WEBDAV_PASSWORD" ]; then
            echo "Uploading all APKs to WebDAV..."
            TAG_NAME=${GITHUB_REF#refs/tags/}
            
            # Create directories step by step
            curl -X MKCOL -u "$WEBDAV_USER:$WEBDAV_PASSWORD" "${WEBDAV_URL}/Auto.js.HYB1996" 2>/dev/null || true
            curl -X MKCOL -u "$WEBDAV_USER:$WEBDAV_PASSWORD" "${WEBDAV_URL}/Auto.js.HYB1996/${TAG_NAME}" 2>/dev/null || true
            
            WEBDAV_PATH="${WEBDAV_URL}/Auto.js.HYB1996/${TAG_NAME}"
            
            # Upload all APK files
            UPLOADED_COUNT=0
            for APK_FILE in $(find artifacts -name "*.apk" -type f); do
              APK_NAME=$(basename "$APK_FILE")
              echo "Uploading $APK_NAME..."
              if curl -T "$APK_FILE" -u "$WEBDAV_USER:$WEBDAV_PASSWORD" "${WEBDAV_PATH}/${APK_NAME}"; then
                UPLOADED_COUNT=$((UPLOADED_COUNT + 1))
              else
                echo "Failed to upload $APK_NAME"
              fi
            done
            
            echo "WebDAV upload completed! Uploaded ${UPLOADED_COUNT} APK files."
          else
            echo "WebDAV credentials not configured, skipping upload"
          fi